<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posto BDLIM</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #07080f; color: #eeeae4; font-family: Georgia, serif; max-width: 430px; margin: 0 auto; min-height: 100vh; }
.header { padding: 16px 20px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; background: #07080f; z-index: 10; }
.sub { font-size: 10px; letter-spacing: 4px; color: #3d8ce0; font-family: monospace; margin-bottom: 2px; }
h1 { font-size: 19px; font-weight: bold; }
h1 span { color: #3d8ce0; }
.content { padding: 20px; }
.logo-box { border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.09); margin-bottom: 22px; }
.logo-inner { background: #0d1e38; height: 140px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; }
.logo-name { font-size: 20px; font-weight: bold; color: #7bb6f0; letter-spacing: 4px; }
.logo-since { font-size: 10px; color: rgba(123,182,240,0.6); letter-spacing: 3px; }
.logo-footer { background: #0a1225; padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; }
.badge { font-size: 9px; padding: 2px 8px; border-radius: 10px; background: rgba(61,140,224,0.15); color: #3d8ce0; font-family: monospace; }
.label { font-size: 9px; letter-spacing: 3px; color: rgba(238,234,228,0.35); font-family: monospace; margin-bottom: 8px; margin-top: 18px; }
.row { display: flex; gap: 10px; }
.tog { flex: 1; padding: 11px; border: 1.5px solid rgba(255,255,255,0.08); border-radius: 10px; background: transparent; color: rgba(238,234,228,0.45); font-size: 14px; cursor: pointer; font-family: inherit; }
.tog.bl { border-color: #3d8ce0; background: rgba(61,140,224,0.12); color: #3d8ce0; }
.tog.pu { border-color: #7b5ea7; background: rgba(123,94,167,0.12); color: #b39ddb; }
input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 10px; color: #eeeae4; font-size: 14px; outline: none; font-family: inherit; }
.btn-gen { width: 100%; padding: 15px; background: linear-gradient(135deg,#0e3270,#3d8ce0); border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; font-family: inherit; margin-top: 20px; }
.btn-gen:disabled { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); cursor: default; }
.err { margin-top: 16px; padding: 12px; border-radius: 10px; background: rgba(200,50,50,0.1); border: 1px solid rgba(200,50,50,0.3); color: #ff8a8a; font-size: 12px; display: none; }
.loading { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 18px; }
.spinner { width: 50px; height: 50px; border-radius: 50%; border: 3px solid rgba(61,140,224,0.12); border-top: 3px solid #3d8ce0; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.res { display: none; padding: 20px; }
.aibox { padding: 14px; border-radius: 12px; margin-bottom: 20px; background: rgba(123,94,167,0.08); border: 1px solid rgba(123,94,167,0.2); display: none; }
.ailbl { font-size: 9px; letter-spacing: 2px; color: #b39ddb; font-family: monospace; margin-bottom: 6px; }
.seclbl { font-size: 9px; letter-spacing: 2px; color: #3d8ce0; font-family: monospace; margin-bottom: 10px; }
.cap { padding: 13px 15px; margin-bottom: 9px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.07); font-size: 13px; line-height: 1.6; cursor: pointer; color: rgba(238,234,228,0.45); }
.cap.on { border-color: #3d8ce0; background: rgba(61,140,224,0.07); color: #eeeae4; }
.btn-save { width: 100%; padding: 15px; background: linear-gradient(135deg,#0e3270,#3d8ce0); border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; font-family: inherit; margin-bottom: 10px; }
.btn-reset { width: 100%; padding: 11px; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: rgba(238,234,228,0.4); font-size: 13px; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
<div class="header">
  <div class="sub">STUDIO IA</div>
  <h1>Posto <span>x</span> BDLIM</h1>
</div>

<div id="pg1" class="content">
  <div class="logo-box">
    <div class="logo-inner">
      <div class="logo-name">BDLIM</div>
      <div class="logo-since">SINCE 1916</div>
    </div>
    <div class="logo-footer">
      <span style="font-size:11px;color:#7bb6f0">Logo BDLIM - Bulles bleues</span>
      <span class="badge">Fierte entreprise</span>
    </div>
  </div>

  <div class="label">CALL TO ACTION</div>
  <div class="row">
    <button class="tog" id="c1" onclick="pick(1,'Oui')">Oui</button>
    <button class="tog" id="c2" onclick="pick(1,'Non')">Non</button>
  </div>

  <div class="label">CE QUE TU VEUX METTRE EN AVANT</div>
  <input id="hl" oninput="chk()" placeholder="ex : 100 ans d histoire, savoir-faire..." />

  <div class="label">TON TITRE</div>
  <input id="ti" oninput="chk()" placeholder="ex : Depuis 1916, on lave plus blanc !" />

  <div class="label">L IA AMELIORE TON TITRE ?</div>
  <div class="row">
    <button class="tog" id="a1" onclick="pick(2,'Oui')">Oui</button>
    <button class="tog" id="a2" onclick="pick(2,'Non')">Non</button>
  </div>

  <div id="errmsg" class="err"></div>
  <button id="genbtn" class="btn-gen" onclick="gen()" disabled>Generer avec l IA</button>
</div>

<div id="pg2" class="loading">
  <div class="spinner"></div>
  <div style="font-size:15px;font-weight:bold">Generation en cours...</div>
  <div style="font-size:12px;color:rgba(238,234,232,0.3)">Connexion Railway</div>
</div>

<div id="pg3" class="res">
  <div id="aibox" class="aibox">
    <div class="ailbl">TITRE AMELIORE PAR L IA</div>
    <div id="aitxt" style="font-size:15px;font-weight:bold;margin-bottom:4px"></div>
    <div id="origtxt" style="font-size:11px;color:rgba(238,234,228,0.3)"></div>
  </div>
  <div class="seclbl">3 CAPTIONS GENEREES PAR L IA</div>
  <div id="capslist"></div>
  <button class="btn-save" onclick="raz()">Enregistrer dans la galerie</button>
  <button class="btn-reset" onclick="raz()">Nouveau post</button>
</div>

<script>
var vcta = null;
var vai = null;

function pick(g, v) {
  if (g === 1) {
    vcta = v;
    document.getElementById('c1').className = 'tog' + (v === 'Oui' ? ' bl' : '');
    document.getElementById('c2').className = 'tog' + (v === 'Non' ? ' bl' : '');
  } else {
    vai = v;
    document.getElementById('a1').className = 'tog' + (v === 'Oui' ? ' pu' : '');
    document.getElementById('a2').className = 'tog' + (v === 'Non' ? ' pu' : '');
  }
  chk();
}

function chk() {
  var ok = vcta && vai && document.getElementById('hl').value.trim() && document.getElementById('ti').value.trim();
  document.getElementById('genbtn').disabled = !ok;
}

function gen() {
  var hl = document.getElementById('hl').value.trim();
  var ti = document.getElementById('ti').value.trim();
  document.getElementById('pg1').style.display = 'none';
  document.getElementById('pg2').style.display = 'flex';
  document.getElementById('errmsg').style.display = 'none';

  fetch('https://posto-production-061c.up.railway.app/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cta: vcta, highlight: hl, title: ti, aiTitle: vai })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var txt = d.text || '';
    var nt = null;
    var caps = [];
    var lines = txt.split('\n');
    for (var i = 0; i < lines.length; i++) {
      var l = lines[i].trim();
      if (l.indexOf('NOUVEAU_TITRE:') === 0) nt = l.replace('NOUVEAU_TITRE:', '').trim();
      else if (l.indexOf('CAPTION_1:') === 0) caps[0] = l.replace('CAPTION_1:', '').trim();
      else if (l.indexOf('CAPTION_2:') === 0) caps[1] = l.replace('CAPTION_2:', '').trim();
      else if (l.indexOf('CAPTION_3:') === 0) caps[2] = l.replace('CAPTION_3:', '').trim();
    }
    while (caps.length < 3) caps.push('BDLIM, depuis 1916.');

    if (nt) {
      document.getElementById('aibox').style.display = 'block';
      document.getElementById('aitxt').textContent = nt;
      document.getElementById('origtxt').textContent = 'Ton titre : ' + ti;
    }

    var cl = document.getElementById('capslist');
    cl.innerHTML = '';
    for (var j = 0; j < 3; j++) {
      var el = document.createElement('div');
      el.className = 'cap' + (j === 0 ? ' on' : '');
      el.textContent = caps[j] || '';
      (function(e) {
        e.onclick = function() {
          var all = document.getElementsByClassName('cap');
          for (var k = 0; k < all.length; k++) all[k].className = 'cap';
          e.className = 'cap on';
        };
      })(el);
      cl.appendChild(el);
    }

    document.getElementById('pg2').style.display = 'none';
    document.getElementById('pg3').style.display = 'block';
  })
  .catch(function(e) {
    document.getElementById('pg2').style.display = 'none';
    document.getElementById('pg1').style.display = 'block';
    var em = document.getElementById('errmsg');
    em.style.display = 'block';
    em.textContent = 'Erreur : ' + e.message;
  });
}

function raz() {
  document.getElementById('pg3').style.display = 'none';
  document.getElementById('pg1').style.display = 'block';
  document.getElementById('aibox').style.display = 'none';
  vcta = null; vai = null;
  document.getElementById('c1').className = 'tog';
  document.getElementById('c2').className = 'tog';
  document.getElementById('a1').className = 'tog';
  document.getElementById('a2').className = 'tog';
  document.getElementById('hl').value = '';
  document.getElementById('ti').value = '';
  document.getElementById('genbtn').disabled = true;
}
</script>
</body>
</html>
