<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posto</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #07080f; color: #eeeae4; font-family: Georgia, serif; max-width: 430px; margin: 0 auto; min-height: 100vh; }
.header { padding: 16px 20px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); position: sticky; top: 0; background: #07080f; z-index: 10; }
.sub { font-size: 10px; letter-spacing: 4px; color: #3d8ce0; font-family: monospace; margin-bottom: 2px; }
h1 { font-size: 19px; font-weight: bold; }
h1 span { color: #3d8ce0; }
.content { padding: 20px; }
.photo-zone { border-radius: 14px; overflow: hidden; border: 1.5px dashed rgba(61,140,224,0.4); margin-bottom: 16px; min-height: 200px; display: flex; align-items: center; justify-content: center; background: #0d1e38; position: relative; cursor: pointer; }
.photo-zone img { width: 100%; height: 200px; object-fit: cover; display: none; }
.photo-placeholder { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 30px; text-align: center; }
.photo-icon { font-size: 48px; }
.photo-text { font-size: 14px; color: rgba(238,234,228,0.6); }
.photo-btns { display: flex; gap: 10px; margin-bottom: 22px; }
.photo-btn { flex: 1; padding: 12px; border: 1.5px solid rgba(61,140,224,0.4); border-radius: 10px; background: rgba(61,140,224,0.08); color: #3d8ce0; font-size: 13px; cursor: pointer; font-family: inherit; text-align: center; }
.label { font-size: 9px; letter-spacing: 3px; color: rgba(238,234,228,0.35); font-family: monospace; margin-bottom: 8px; margin-top: 18px; }
.row { display: flex; gap: 10px; }
.tog { flex: 1; padding: 11px; border: 1.5px solid rgba(255,255,255,0.08); border-radius: 10px; background: transparent; color: rgba(238,234,228,0.45); font-size: 14px; cursor: pointer; font-family: inherit; }
.tog.bl { border-color: #3d8ce0; background: rgba(61,140,224,0.12); color: #3d8ce0; }
.tog.pu { border-color: #7b5ea7; background: rgba(123,94,167,0.12); color: #b39ddb; }
input[type="text"] { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 10px; color: #eeeae4; font-size: 14px; outline: none; font-family: inherit; }
.btn-gen { width: 100%; padding: 15px; background: linear-gradient(135deg,#0e3270,#3d8ce0); border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: bold; cursor: pointer; font-family: inherit; margin-top: 20px; }
.btn-gen:disabled { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); cursor: default; }
.err { margin-top: 16px; padding: 12px; border-radius: 10px; background: rgba(200,50,50,0.1); border: 1px solid rgba(200,50,50,0.3); color: #ff8a8a; font-size: 12px; display: none; }
.loading { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 18px; }
.spinner { width: 50px; height: 50px; border-radius: 50%; border: 3px solid rgba(61,140,224,0.12); border-top: 3px solid #3d8ce0; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.res { display: none; padding: 20px; }
.preview-wrap { position: relative; margin-bottom: 16px; border-radius: 14px; overflow: hidden; }
.preview-wrap img { width: 100%; max-height: 250px; object-fit: cover; display: block; }
.preview-wrap .overlay-title { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: #fff; font-size: 14px; font-weight: bold; }
.aibox { padding: 14px; border-radius: 12px; margin-bottom: 20px; background: rgba(123,94,167,0.08); border: 1px solid rgba(123,94,167,0.2); display: none; }
.ailbl { font-size: 9px; letter-spacing: 2px; color: #b39ddb; font-family: monospace; margin-bottom: 6px; }
.seclbl { font-size: 9px; letter-spacing: 2px; color: #3d8ce0; font-family: monospace; margin-bottom: 10px; }
.cap { padding: 13px 15px; margin-bottom: 9px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.07); font-size: 13px; line-height: 1.6; cursor: pointer; color: rgba(238,234,228,0.45); }
.cap.on { border-color: #3d8ce0; background: rgba(61,140,224,0.07); color: #eeeae4; }
.share-btns { display: flex; gap: 10px; margin-bottom: 10px; }
.share-btn { flex: 1; padding: 13px; border: none; border-radius: 12px; color: #fff; font-size: 13px; font-weight: bold; cursor: pointer; font-family: inherit; text-align: center; }
.share-ig { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }
.share-li { background: #0077b5; }
.btn-save { width: 100%; padding: 13px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; color: #eeeae4; font-size: 13px; font-weight: bold; cursor: pointer; font-family: inherit; margin-bottom: 10px; }
.btn-reset { width: 100%; padding: 11px; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: rgba(238,234,228,0.4); font-size: 13px; cursor: pointer; font-family: inherit; }
input[type="file"] { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="sub">STUDIO IA</div>
  <h1>Posto <span>&times;</span> BDLIM</h1>
</div>

<input type="file" id="fileinput" accept="image/*" onchange="onPhoto(event)" />
<input type="file" id="camerainput" accept="image/*" capture="environment" onchange="onPhoto(event)" />

<div id="pg1" class="content">

  <div class="photo-zone" onclick="document.getElementById('fileinput').click()">
    <img id="photopreview" src="" alt="photo" />
    <div class="photo-placeholder" id="photoplaceholder">
      <div class="photo-icon">&#128247;</div>
      <div class="photo-text">Appuie pour ajouter ta photo</div>
    </div>
  </div>

  <div class="photo-btns">
    <button class="photo-btn" onclick="document.getElementById('camerainput').click()">&#128248; Prendre une photo</button>
    <button class="photo-btn" onclick="document.getElementById('fileinput').click()">&#128444; Galerie</button>
  </div>

  <div class="label">CALL TO ACTION</div>
  <div class="row">
    <button class="tog" id="c1" onclick="pick(1,'Oui')">Oui</button>
    <button class="tog" id="c2" onclick="pick(1,'Non')">Non</button>
  </div>

  <div class="label">CE QUE TU VEUX METTRE EN AVANT</div>
  <input type="text" id="hl" oninput="chk()" placeholder="ex : 100 ans d'histoire, savoir-faire..." />

  <div class="label">TON TITRE</div>
  <input type="text" id="ti" oninput="chk()" placeholder="ex : Depuis 1916, on lave plus blanc !" />

  <div class="label">L'IA AM&Eacute;LIORE TON TITRE ?</div>
  <div class="row">
    <button class="tog" id="a1" onclick="pick(2,'Oui')">Oui</button>
    <button class="tog" id="a2" onclick="pick(2,'Non')">Non</button>
  </div>

  <div id="errmsg" class="err"></div>
  <button id="genbtn" class="btn-gen" onclick="gen()" disabled>&#10024; G&eacute;n&eacute;rer avec l'IA</button>
</div>

<div id="pg2" class="loading">
  <div class="spinner"></div>
  <div style="font-size:15px;font-weight:bold">G&eacute;n&eacute;ration en cours...</div>
  <div style="font-size:12px;color:rgba(238,234,232,0.3)">L'IA cr&eacute;e ton contenu</div>
</div>

<div id="pg3" class="res">
  <div class="preview-wrap" id="previewwrap" style="display:none">
    <img id="resphoto" src="" alt="photo" />
    <div class="overlay-title" id="overlaytitle"></div>
  </div>

  <div id="aibox" class="aibox">
    <div class="ailbl">&#10024; TITRE AM&Eacute;LIOR&Eacute; PAR L'IA</div>
    <div id="aitxt" style="font-size:15px;font-weight:bold;margin-bottom:4px"></div>
    <div id="origtxt" style="font-size:11px;color:rgba(238,234,228,0.3)"></div>
  </div>

  <div class="seclbl">3 CAPTIONS G&Eacute;N&Eacute;R&Eacute;ES PAR L'IA</div>
  <div id="capslist"></div>

  <div class="share-btns">
    <button class="share-btn share-ig" onclick="shareIG()">&#128247; Instagram</button>
    <button class="share-btn share-li" onclick="shareLI()">in LinkedIn</button>
  </div>

  <button class="btn-save" onclick="savePhoto()">&#128190; Enregistrer la photo</button>
  <button class="btn-reset" onclick="raz()">&#8617; Nouveau post</button>
</div>

<script>
var vcta = null;
var vai = null;
var photoData = null;
var selectedCaption = '';

function onPhoto(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    photoData = ev.target.result;
    document.getElementById('photopreview').src = photoData;
    document.getElementById('photopreview').style.display = 'block';
    document.getElementById('photoplaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function pick(g, v) {
  if (g === 1) {
    vcta = v;
    document.getElementById('c1').className = 'tog' + (v === 'Oui' ? ' bl' : '');
    document.getElementById('c2').className = 'tog' + (v === 'Non' ? ' bl' : '');
  } else {
    vai = v;
    document.getElementById('a1').className = 'tog' + (v === 'Oui' ? ' pu' : '');
    document.getElementById('a2').className = 'tog' + (v === 'Non' ? ' pu' : '');
  }
  chk();
}

function chk() {
  var ok = vcta && vai && document.getElementById('hl').value.trim() && document.getElementById('ti').value.trim();
  document.getElementById('genbtn').disabled = !ok;
}

function gen() {
  var hl = document.getElementById('hl').value.trim();
  var ti = document.getElementById('ti').value.trim();
  document.getElementById('pg1').style.display = 'none';
  document.getElementById('pg2').style.display = 'flex';
  document.getElementById('errmsg').style.display = 'none';

  fetch('https://posto-production-061c.up.railway.app/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cta: vcta, highlight: hl, title: ti, aiTitle: vai })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var txt = d.text || '';
    var nt = null;
    var caps = [];
    var lines = txt.split('\n');
    for (var i = 0; i < lines.length; i++) {
      var l = lines[i].trim();
      if (l.indexOf('NOUVEAU_TITRE:') === 0) nt = l.replace('NOUVEAU_TITRE:', '').trim();
      else if (l.indexOf('CAPTION_1:') === 0) caps[0] = l.replace('CAPTION_1:', '').trim();
      else if (l.indexOf('CAPTION_2:') === 0) caps[1] = l.replace('CAPTION_2:', '').trim();
      else if (l.indexOf('CAPTION_3:') === 0) caps[2] = l.replace('CAPTION_3:', '').trim();
    }
    while (caps.length < 3) caps.push('BDLIM, depuis 1916.');
    selectedCaption = caps[0] || '';

    if (photoData) {
      document.getElementById('resphoto').src = photoData;
      document.getElementById('previewwrap').style.display = 'block';
      document.getElementById('overlaytitle').textContent = nt || document.getElementById('ti').value;
    }

    if (nt) {
      document.getElementById('aibox').style.display = 'block';
      document.getElementById('aitxt').textContent = nt;
      document.getElementById('origtxt').textContent = 'Ton titre : ' + document.getElementById('ti').value;
    }

    var cl = document.getElementById('capslist');
    cl.innerHTML = '';
    for (var j = 0; j < 3; j++) {
      var el = document.createElement('div');
      el.className = 'cap' + (j === 0 ? ' on' : '');
      el.textContent = caps[j] || '';
      (function(e, c) {
        e.onclick = function() {
          var all = document.getElementsByClassName('cap');
          for (var k = 0; k < all.length; k++) all[k].className = 'cap';
          e.className = 'cap on';
          selectedCaption = c;
        };
      })(el, caps[j]);
      cl.appendChild(el);
    }

    document.getElementById('pg2').style.display = 'none';
    document.getElementById('pg3').style.display = 'block';
  })
  .catch(function(e) {
    document.getElementById('pg2').style.display = 'none';
    document.getElementById('pg1').style.display = 'block';
    var em = document.getElementById('errmsg');
    em.style.display = 'block';
    em.textContent = 'Erreur : ' + e.message;
  });
}

function shareIG() {
  var text = encodeURIComponent(selectedCaption);
  window.open('https://www.instagram.com/', '_blank');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(selectedCaption);
    alert('Caption copiee ! Colle-la dans Instagram.');
  }
}

function shareLI() {
  var text = encodeURIComponent(selectedCaption);
  var url = 'https://www.linkedin.com/sharing/share-offsite/?url=https://posto-production-061c.up.railway.app&summary=' + text;
  window.open(url, '_blank');
}

function savePhoto() {
  if (!photoData) { alert('Pas de photo a enregistrer.'); return; }
  var a = document.createElement('a');
  a.href = photoData;
  a.download = 'posto-bdlim.jpg';
  a.click();
  alert('Photo enregistree !');
}

function raz() {
  document.getElementById('pg3').style.display = 'none';
  document.getElementById('pg1').style.display = 'block';
  document.getElementById('aibox').style.display = 'none';
  document.getElementById('previewwrap').style.display = 'none';
  document.getElementById('photopreview').style.display = 'none';
  document.getElementById('photoplaceholder').style.display = 'flex';
  vcta = null; vai = null; photoData = null; selectedCaption = '';
  document.getElementById('c1').className = 'tog';
  document.getElementById('c2').className = 'tog';
  document.getElementById('a1').className = 'tog';
  document.getElementById('a2').className = 'tog';
  document.getElementById('hl').value = '';
  document.getElementById('ti').value = '';
  document.getElementById('genbtn').disabled = true;
}
</script>
</body>
</html>
